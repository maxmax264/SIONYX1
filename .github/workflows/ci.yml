name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: sionyx-web/package-lock.json

      - name: Install dependencies
        working-directory: sionyx-web
        run: npm ci

      - name: Lint
        working-directory: sionyx-web
        run: npm run lint

      - name: Test
        working-directory: sionyx-web
        run: npm run test:run

  kiosk-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Test
        working-directory: sionyx-kiosk-wpf
        run: dotnet test

  installer-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Publish app
        working-directory: sionyx-kiosk-wpf
        run: >-
          dotnet publish src/SionyxKiosk/SionyxKiosk.csproj
          -c Release -r win-x64 --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:DebugType=none /p:DebugSymbols=false
          -o dist

      - name: Build MSI installer
        working-directory: sionyx-kiosk-wpf
        shell: pwsh
        run: |
          $publishDir = (Resolve-Path dist).Path
          $sourceDir  = (Resolve-Path .).Path
          dotnet build installer/SionyxInstaller.wixproj `
            -c Release -p:Platform=x64 `
            "-p:ProductVersion=0.0.1" `
            "-p:PublishDir=$publishDir" `
            "-p:SourceDir=$sourceDir"

      - name: Install MSI (silent)
        shell: pwsh
        run: |
          $msi = (Get-ChildItem sionyx-kiosk-wpf/installer/bin/x64/Release/*.msi)[0]
          Write-Host "Installing: $($msi.FullName)"
          $logFile = Join-Path $env:RUNNER_TEMP "msi-install.log"
          $proc = Start-Process msiexec.exe `
            -ArgumentList "/i `"$($msi.FullName)`" /qn ORGID=ci-test-org /l*v `"$logFile`"" `
            -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Host "`n=== CUSTOM ACTION LOG (errors & actions) ==="
            if (Test-Path $logFile) {
              Get-Content $logFile | Select-String -Pattern '\[ERROR\]|\[FAIL\]|Return value 3|ActionStart|failed|exception' -SimpleMatch:$false |
                Select-Object -First 60 | ForEach-Object { Write-Host $_.Line }
              Write-Host "`n=== MSI install log (last 40 lines) ==="
              Get-Content $logFile | Select-Object -Last 40
            }
            throw "MSI install failed with exit code $($proc.ExitCode)"
          }
          Write-Host "MSI installed successfully"

      - name: Verify installation
        shell: pwsh
        run: |
          $pass = 0; $fail = 0; $warn = 0
          function Assert-Pass($msg)  { $script:pass++; Write-Host "[PASS] $msg" }
          function Assert-Fail($msg)  { $script:fail++; Write-Host "[FAIL] $msg" }
          function Assert-Warn($msg)  { $script:warn++; Write-Host "[WARN] $msg" }
          function Assert-Equal($name, $actual, $expected) {
            if ("$actual" -eq "$expected") { Assert-Pass "$name = '$expected'" }
            else { Assert-Fail "$name = '$actual' (expected '$expected')" }
          }
          function Assert-Exists($path) {
            if (Test-Path $path) { Assert-Pass "Exists: $path" }
            else { Assert-Fail "Missing: $path" }
          }

          $installDir = "C:\Program Files\SIONYX"

          # ── FILES & DIRECTORIES ────────────────────────────────
          Write-Host "`n=== FILES & DIRECTORIES ==="
          Assert-Exists "$installDir"
          Assert-Exists "$installDir\SionyxKiosk.exe"
          Assert-Exists "$installDir\app-logo.ico"
          Assert-Exists "$installDir\Assets"
          Assert-Exists "$installDir\Assets\templates"
          Assert-Exists "$installDir\Assets\templates\payment.html"
          Assert-Exists "$installDir\install.log"

          # ── HKLM:\SOFTWARE\SIONYX — INSTALL INFO ──────────────
          Write-Host "`n=== REGISTRY: INSTALL INFO ==="
          $reg = Get-ItemProperty "HKLM:\SOFTWARE\SIONYX" -ErrorAction SilentlyContinue
          if (-not $reg) { Assert-Fail "Registry key HKLM:\SOFTWARE\SIONYX missing"; exit 1 }
          Assert-Pass "Registry key HKLM:\SOFTWARE\SIONYX exists"
          Assert-Equal "Install_Dir" $reg.Install_Dir "$installDir\"
          Assert-Equal "Version" $reg.Version "0.0.1"
          Assert-Equal "OrgId" $reg.OrgId "ci-test-org"
          Assert-Equal "KioskUsername" $reg.KioskUsername "SionyxUser"
          Assert-Equal "installed" $reg.installed 1

          # ── HKLM:\SOFTWARE\SIONYX — FIREBASE CONFIG ───────────
          Write-Host "`n=== REGISTRY: FIREBASE CONFIG ==="
          Assert-Equal "FirebaseApiKey" $reg.FirebaseApiKey "REDACTED_FIREBASE_API_KEY"
          Assert-Equal "FirebaseAuthDomain" $reg.FirebaseAuthDomain "REDACTED_FIREBASE_AUTH_DOMAIN"
          Assert-Equal "FirebaseProjectId" $reg.FirebaseProjectId "sionyx-19636"
          Assert-Equal "FirebaseDatabaseUrl" $reg.FirebaseDatabaseUrl "https://REDACTED_FIREBASE_DATABASE_URL"
          Assert-Equal "FirebaseStorageBucket" $reg.FirebaseStorageBucket "REDACTED_FIREBASE_STORAGE_BUCKET"
          Assert-Equal "FirebaseMessagingSenderId" $reg.FirebaseMessagingSenderId "961130757239"
          Assert-Equal "FirebaseAppId" $reg.FirebaseAppId "REDACTED_FIREBASE_APP_ID"
          Assert-Equal "FirebaseMeasurementId" $reg.FirebaseMeasurementId "REDACTED_FIREBASE_MEASUREMENT_ID"
          Assert-Equal "firebaseConfigured" $reg.firebaseConfigured 1

          # ── HKLM:\SOFTWARE\SIONYX — PAYMENT & SECURITY ────────
          Write-Host "`n=== REGISTRY: PAYMENT & SECURITY ==="
          Assert-Equal "NedarimCallbackUrl" $reg.NedarimCallbackUrl "https://us-central1-sionyx-19636.cloudfunctions.net/nedarimCallback"
          Assert-Equal "AdminExitPassword" $reg.AdminExitPassword "REDACTED_ADMIN_PASSWORD"
          Assert-Equal "paymentConfigured" $reg.paymentConfigured 1

          # ── HKCU:\Software\SIONYX — SHORTCUT MARKERS ──────────
          Write-Host "`n=== REGISTRY: SHORTCUT MARKERS (HKCU) ==="
          $hkcu = Get-ItemProperty "HKCU:\Software\SIONYX" -ErrorAction SilentlyContinue
          if ($hkcu) {
            Assert-Equal "DesktopShortcut" $hkcu.DesktopShortcut 1
            Assert-Equal "StartMenuShortcut" $hkcu.StartMenuShortcut 1
            Assert-Equal "StartMenuInstalled" $hkcu.StartMenuInstalled 1
          } else {
            Assert-Fail "HKCU:\Software\SIONYX key missing"
          }

          # ── SHORTCUTS ─────────────────────────────────────────
          Write-Host "`n=== SHORTCUTS ==="
          $startMenu = Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs\SIONYX"
          Assert-Exists (Join-Path $startMenu "SIONYX.lnk")
          Assert-Exists (Join-Path $startMenu "Uninstall SIONYX.lnk")

          # ── USER ACCOUNT ──────────────────────────────────────
          Write-Host "`n=== USER ACCOUNT: SionyxUser ==="
          $user = Get-LocalUser -Name "SionyxUser" -ErrorAction SilentlyContinue
          if (-not $user) { Assert-Fail "SionyxUser account NOT created" }
          else {
            Assert-Pass "SionyxUser account exists"
            Assert-Equal "Enabled" $user.Enabled $true
            Assert-Equal "PasswordExpires" $user.PasswordExpires $false

            $inUsers = (Get-LocalGroupMember -Group "Users" -ErrorAction SilentlyContinue) |
              Where-Object { $_.Name -like "*\SionyxUser" }
            if ($inUsers) { Assert-Pass "SionyxUser is in 'Users' group" }
            else { Assert-Fail "SionyxUser NOT in 'Users' group" }

            $inAdmins = (Get-LocalGroupMember -Group "Administrators" -ErrorAction SilentlyContinue) |
              Where-Object { $_.Name -like "*\SionyxUser" }
            if (-not $inAdmins) { Assert-Pass "SionyxUser is NOT in 'Administrators'" }
            else { Assert-Fail "SionyxUser IS in 'Administrators' (should not be)" }
          }

          # ── USER PROFILE ──────────────────────────────────────
          Write-Host "`n=== USER PROFILE ==="
          $profile = "C:\Users\SionyxUser"
          if (Test-Path $profile) {
            Assert-Pass "Profile directory exists"
            Assert-Exists "$profile\.sionyx"
            Assert-Exists "$profile\AppData\Local\SIONYX\logs"
            $startup = "$profile\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup\SIONYX.lnk"
            Assert-Exists $startup
          } else {
            Assert-Warn "Profile directory not created (deferred to first logon)"
          }

          # ── SCHEDULED TASK ────────────────────────────────────
          Write-Host "`n=== SCHEDULED TASK ==="
          $task = Get-ScheduledTask -TaskName "SIONYX Kiosk" -ErrorAction SilentlyContinue
          if (-not $task) { Assert-Fail "Scheduled task 'SIONYX Kiosk' NOT found" }
          else {
            Assert-Pass "Scheduled task 'SIONYX Kiosk' exists"

            $action = $task.Actions[0]
            if ($action.Execute -like "*SionyxKiosk.exe") { Assert-Pass "Task action = SionyxKiosk.exe" }
            else { Assert-Fail "Task action = '$($action.Execute)' (expected SionyxKiosk.exe)" }
            Assert-Equal "Task argument" $action.Arguments "--kiosk"

            $trigger = $task.Triggers[0]
            Assert-Equal "Task trigger type" $trigger.CimClass.CimClassName "MSFT_TaskLogonTrigger"

            $principal = $task.Principal
            if ($principal.UserId -like "*SionyxUser") { Assert-Pass "Task principal = SionyxUser" }
            else { Assert-Fail "Task principal = '$($principal.UserId)' (expected SionyxUser)" }
            Assert-Equal "Task LogonType" $principal.LogonType "Interactive"
            Assert-Equal "Task RunLevel" $principal.RunLevel "Limited"
          }

          # ── LOGIN TILE REGISTRY ───────────────────────────────
          Write-Host "`n=== LOGIN TILE REGISTRY ==="
          $lsa = Get-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" -ErrorAction SilentlyContinue
          Assert-Equal "LimitBlankPasswordUse" $lsa.LimitBlankPasswordUse 0

          $pwless = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\PasswordLess\Device" -ErrorAction SilentlyContinue
          if ($pwless) {
            Assert-Equal "DevicePasswordLessBuildVersion" $pwless.DevicePasswordLessBuildVersion 0
          } else {
            Assert-Warn "PasswordLess\Device key not present (OK on older Windows)"
          }

          $uSwitch = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Authentication\LogonUI\UserSwitch" -ErrorAction SilentlyContinue
          if ($uSwitch -and $uSwitch.Enabled -eq 1) { Assert-Pass "UserSwitch\Enabled = 1" }
          else { Assert-Warn "UserSwitch\Enabled != 1 (may be dynamically managed by Windows)" }

          # ── PER-USER KIOSK LOCKDOWN POLICIES ──────────────────
          Write-Host "`n=== PER-USER KIOSK LOCKDOWN (SionyxUser hive) ==="
          $ntuser = "C:\Users\SionyxUser\ntuser.dat"
          if (Test-Path $ntuser) {
            $hiveLoaded = $false
            try {
              reg load "HKU\CI_VERIFY" $ntuser 2>$null
              if ($LASTEXITCODE -eq 0) { $hiveLoaded = $true }
            } catch {}

            if ($hiveLoaded) {
              try {
                $explorer = Get-ItemProperty "Registry::HKU\CI_VERIFY\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer" -ErrorAction SilentlyContinue
                Assert-Equal "SionyxUser NoRun" $explorer.NoRun 1

                $system = Get-ItemProperty "Registry::HKU\CI_VERIFY\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -ErrorAction SilentlyContinue
                Assert-Equal "SionyxUser DisableRegistryTools" $system.DisableRegistryTools 1
                Assert-Equal "SionyxUser DisableCMD" $system.DisableCMD 2
                Assert-Equal "SionyxUser DisableTaskMgr" $system.DisableTaskMgr 1
              } finally {
                [GC]::Collect(); [GC]::WaitForPendingFinalizers()
                reg unload "HKU\CI_VERIFY" 2>$null
              }
            } else {
              Assert-Warn "Could not load SionyxUser hive for policy check"
            }
          } else {
            Assert-Warn "ntuser.dat not found — cannot verify per-user policies"
          }

          # ── NO MACHINE-WIDE LOCKDOWN ──────────────────────────
          Write-Host "`n=== NO MACHINE-WIDE LOCKDOWN POLICIES ==="
          $polSys = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -ErrorAction SilentlyContinue
          $polExp = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer" -ErrorAction SilentlyContinue

          foreach ($p in @("DisableRegistryTools","DisableCMD","DisableTaskMgr")) {
            $v = $polSys.$p
            if ($null -eq $v -or $v -eq 0) { Assert-Pass "No machine-wide $p" }
            else { Assert-Fail "Machine-wide $p = $v (should not be set!)" }
          }
          $noRun = $polExp.NoRun
          if ($null -eq $noRun -or $noRun -eq 0) { Assert-Pass "No machine-wide NoRun" }
          else { Assert-Fail "Machine-wide NoRun = $noRun (should not be set!)" }

          # ── WINLOGON SAFETY ───────────────────────────────────
          Write-Host "`n=== WINLOGON SAFETY ==="
          $wl = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" -ErrorAction SilentlyContinue
          if ($wl.AutoAdminLogon -ne "1") { Assert-Pass "AutoAdminLogon is not '1'" }
          else { Assert-Fail "AutoAdminLogon = '1' (unsafe!)" }

          if ($wl.DefaultUserName -ne "SionyxUser") { Assert-Pass "DefaultUserName is not SionyxUser" }
          else { Assert-Fail "DefaultUserName = SionyxUser (should be cleared)" }

          # ── ADD/REMOVE PROGRAMS ───────────────────────────────
          Write-Host "`n=== ADD/REMOVE PROGRAMS ==="
          $arp = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*" |
            Where-Object { $_.DisplayName -eq "SIONYX" }
          if ($arp) {
            Assert-Pass "SIONYX listed in Add/Remove Programs"
            Assert-Equal "ARP Manufacturer" $arp.Publisher "SIONYX Technologies"
          } else {
            Assert-Fail "SIONYX NOT listed in Add/Remove Programs"
          }

          # ── SUMMARY ───────────────────────────────────────────
          Write-Host "`n=========================================="
          Write-Host "  PASS: $pass  |  FAIL: $fail  |  WARN: $warn"
          Write-Host "=========================================="
          if ($fail -gt 0) { throw "Installation verification failed with $fail failure(s)" }
          Write-Host "ALL CHECKS PASSED"

      - name: Uninstall MSI (silent)
        shell: pwsh
        run: |
          $msi = (Get-ChildItem sionyx-kiosk-wpf/installer/bin/x64/Release/*.msi)[0]
          $logFile = Join-Path $env:RUNNER_TEMP "msi-uninstall.log"
          $proc = Start-Process msiexec.exe `
            -ArgumentList "/x `"$($msi.FullName)`" /qn /l*v `"$logFile`"" `
            -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Host "`n=== UNINSTALL LOG (errors & actions) ==="
            if (Test-Path $logFile) {
              Get-Content $logFile | Select-String -Pattern '\[ERROR\]|\[FAIL\]|Return value 3|ActionStart|failed|exception' -SimpleMatch:$false |
                Select-Object -First 60 | ForEach-Object { Write-Host $_.Line }
              Write-Host "`n=== MSI uninstall log (last 40 lines) ==="
              Get-Content $logFile | Select-Object -Last 40
            }
            throw "MSI uninstall failed with exit code $($proc.ExitCode)"
          }
          Write-Host "MSI uninstalled successfully"

      - name: Verify uninstall cleanup
        shell: pwsh
        run: |
          $pass = 0; $fail = 0; $warn = 0
          function Assert-Pass($msg)  { $script:pass++; Write-Host "[PASS] $msg" }
          function Assert-Fail($msg)  { $script:fail++; Write-Host "[FAIL] $msg" }
          function Assert-Warn($msg)  { $script:warn++; Write-Host "[WARN] $msg" }
          function Assert-Gone($path) {
            if (-not (Test-Path $path)) { Assert-Pass "Removed: $path" }
            else { Assert-Fail "Still exists: $path" }
          }

          $installDir = "C:\Program Files\SIONYX"

          # ── FILES REMOVED ─────────────────────────────────────
          Write-Host "`n=== FILES REMOVED ==="
          Assert-Gone "$installDir\SionyxKiosk.exe"
          Assert-Gone "$installDir\app-logo.ico"
          Assert-Gone "$installDir\Assets\templates\payment.html"

          # ── HKLM REGISTRY CLEANED ─────────────────────────────
          Write-Host "`n=== REGISTRY CLEANED ==="
          $reg = Get-ItemProperty "HKLM:\SOFTWARE\SIONYX" -ErrorAction SilentlyContinue
          if (-not $reg) {
            Assert-Pass "HKLM:\SOFTWARE\SIONYX key removed"
          } else {
            $remaining = ($reg.PSObject.Properties | Where-Object { $_.Name -notlike "PS*" }).Name -join ", "
            Assert-Fail "HKLM:\SOFTWARE\SIONYX still has values: $remaining"
          }

          # ── HKCU REGISTRY CLEANED ─────────────────────────────
          $hkcu = Get-ItemProperty "HKCU:\Software\SIONYX" -ErrorAction SilentlyContinue
          if (-not $hkcu) {
            Assert-Pass "HKCU:\Software\SIONYX key removed"
          } else {
            Assert-Warn "HKCU:\Software\SIONYX still present (WiX removes per-user on uninstall)"
          }

          # ── SHORTCUTS REMOVED ─────────────────────────────────
          Write-Host "`n=== SHORTCUTS REMOVED ==="
          $startMenu = Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs\SIONYX"
          Assert-Gone (Join-Path $startMenu "SIONYX.lnk")
          Assert-Gone (Join-Path $startMenu "Uninstall SIONYX.lnk")

          # ── USER ACCOUNT REMOVED ──────────────────────────────
          Write-Host "`n=== USER ACCOUNT ==="
          $user = Get-LocalUser -Name "SionyxUser" -ErrorAction SilentlyContinue
          if (-not $user) { Assert-Pass "SionyxUser account removed" }
          else { Assert-Fail "SionyxUser still exists" }

          # ── USER PROFILE CLEANED ──────────────────────────────
          Write-Host "`n=== USER PROFILE ==="
          if (-not (Test-Path "C:\Users\SionyxUser")) {
            Assert-Pass "Profile directory C:\Users\SionyxUser removed"
          } else {
            Assert-Warn "Profile directory still exists (may require reboot)"
          }

          # ── SCHEDULED TASK REMOVED ────────────────────────────
          Write-Host "`n=== SCHEDULED TASK ==="
          $task = Get-ScheduledTask -TaskName "SIONYX Kiosk" -ErrorAction SilentlyContinue
          if (-not $task) { Assert-Pass "Scheduled task 'SIONYX Kiosk' removed" }
          else { Assert-Fail "Scheduled task still exists" }

          # ── LEGACY AUTO-RUN CLEANED ───────────────────────────
          Write-Host "`n=== LEGACY AUTO-RUN ==="
          $run = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" -ErrorAction SilentlyContinue
          if ($null -eq $run.SIONYX) { Assert-Pass "No SIONYX in HKLM Run key" }
          else { Assert-Fail "SIONYX still in HKLM Run key" }

          # ── NO MACHINE-WIDE LOCKDOWN LEFT ─────────────────────
          Write-Host "`n=== NO LEFTOVER POLICIES ==="
          $polSys = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -ErrorAction SilentlyContinue
          $polExp = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer" -ErrorAction SilentlyContinue
          foreach ($p in @("DisableRegistryTools","DisableCMD","DisableTaskMgr")) {
            $v = $polSys.$p
            if ($null -eq $v -or $v -eq 0) { Assert-Pass "No leftover $p" }
            else { Assert-Fail "Leftover $p = $v" }
          }
          $noRun = $polExp.NoRun
          if ($null -eq $noRun -or $noRun -eq 0) { Assert-Pass "No leftover NoRun" }
          else { Assert-Fail "Leftover NoRun = $noRun" }

          # ── ADD/REMOVE PROGRAMS ───────────────────────────────
          Write-Host "`n=== ADD/REMOVE PROGRAMS ==="
          $arp = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*" -ErrorAction SilentlyContinue |
            Where-Object { $_.DisplayName -eq "SIONYX" }
          if (-not $arp) { Assert-Pass "SIONYX removed from Add/Remove Programs" }
          else { Assert-Fail "SIONYX still listed in Add/Remove Programs" }

          # ── SUMMARY ───────────────────────────────────────────
          Write-Host "`n=========================================="
          Write-Host "  PASS: $pass  |  FAIL: $fail  |  WARN: $warn"
          Write-Host "=========================================="
          if ($fail -gt 0) { throw "Uninstall verification failed with $fail failure(s)" }
          Write-Host "ALL CHECKS PASSED"

      - name: Upload MSI logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msi-logs
          path: |
            ${{ runner.temp }}/msi-install.log
            ${{ runner.temp }}/msi-uninstall.log
